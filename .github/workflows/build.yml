name: Fraud Academy Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Evidence First wording check
        run: npm run evidence-first-check

      - name: Functional smoke check
        run: npm run functional-smoke-check 2>&1 | tee functional-smoke-results.txt

      - name: Upload functional smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-smoke-results
          path: functional-smoke-results.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Visual three-case smoke check
        run: npm run visual-three-case-smoke-check

      - name: Generated-case repository smoke check
        run: npm run generated-case-smoke-check

      - name: All-scenario generated packet smoke check
        run: npm run generator-merchant-smoke-check

      - name: Luna single-module smoke check
        run: npm run luna-single-module-smoke-check

      - name: Review package smoke check
        run: npm run review-package-smoke-check

      - name: Remaining module depth smoke check
        run: npm run remaining-module-depth-smoke-check

      - name: Navigation direct-collapse smoke check
        run: npm run navigation-direct-collapse-smoke-check

      - name: Academy Progress package-flow smoke check
        run: npm run academy-progress-smoke-check

      - name: Summary direct-collapse smoke check
        run: npm run summary-direct-collapse-smoke-check

      - name: Workspace case-state hook smoke check
        run: npm run workspace-case-state-hook-smoke-check

      - name: Workspace action controller smoke check
        run: npm run workspace-actions-controller-smoke-check

      - name: Display handoff smoke check
        run: npm run display-handoff-smoke-check

      - name: Display Phase 1 global-shell smoke check
        run: npm run display-phase-one-smoke-check

      - name: Display Phase 2 workflow-rail smoke check
        run: npm run display-phase-two-smoke-check

      - name: Display Phase 3 hierarchy-and-glow smoke check
        run: npm run display-phase-three-smoke-check

      - name: Display Phase 4 responsive-record smoke check
        run: npm run display-phase-four-smoke-check

      - name: Display Phase 5 release-readiness smoke check
        run: npm run display-phase-five-smoke-check

      - name: Dashboard approved-theme v1 smoke check
        run: npm run dashboard-theme-v1-smoke-check

      - name: Cases approved-theme v1 smoke check
        run: npm run cases-theme-v1-smoke-check

      - name: Workspace shell approved-theme v1 smoke check
        run: npm run workspace-shell-theme-v1-smoke-check

      - name: Case Briefing approved-theme v1 smoke check
        run: npm run case-briefing-theme-v1-smoke-check

      - name: Customer 360 approved-theme v1 smoke check
        run: npm run customer-360-theme-v1-smoke-check

      - name: Investigation tools approved-theme v1 smoke check
        run: npm run investigation-tools-theme-v1-smoke-check

      - name: Timeline approved-theme v1 smoke check
        run: npm run timeline-theme-v1-smoke-check

      - name: Decision and Luna approved-theme v1 smoke check
        run: npm run decision-luna-theme-v1-smoke-check

      - name: Academy approved-theme v1 smoke check
        run: npm run academy-theme-v1-smoke-check

      - name: Profile approved-theme v1 smoke check
        run: npm run profile-theme-v1-smoke-check

      - name: Final responsive/mobile polish v1 smoke check
        run: npm run final-responsive-polish-v1-smoke-check

      - name: Release package documentation smoke check
        run: npm run release-package-smoke-check

      - name: Production build
        run: npm run build

  browser:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium >/dev/null

      - name: Build browser target
        run: npm run build

      - name: Desktop and mobile browser smoke
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: playwright-results.json
        run: npm run browser-smoke-check:ci -- --reporter=json

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-results
          path: |
            playwright-results.json
            test-results
          if-no-files-found: ignore
          retention-days: 3
