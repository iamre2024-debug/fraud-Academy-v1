name: Fraud Academy Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Full source-of-truth verification
        run: npm run verify

  browser:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium >/dev/null

      - name: Build browser target
        run: npm run build

      - name: Desktop and mobile browser smoke
        run: npm run browser-smoke-check:ci -- --reporter=line
