name: Fraud Academy Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Full source-of-truth verification
        shell: bash
        run: |
          set +e
          npm run verify > verify.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Verification failed. Showing the final diagnostic lines:"
            tail -n 120 verify.log
            exit "$status"
          fi
          tail -n 40 verify.log

  browser:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Install Chromium browser
        run: npx playwright install --with-deps chromium >/dev/null

      - name: Build browser target
        run: npm run build

      - name: Desktop and mobile browser smoke
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: playwright-results.json
        run: npm run browser-smoke-check:ci -- --reporter=json

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-results
          path: |
            playwright-results.json
            test-results
          if-no-files-found: ignore
          retention-days: 3
