name: Synchronize Profile handoff

on:
  push:
    branches:
      - agent/profile-handoff-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: agent/profile-handoff-sync
          fetch-depth: 0

      - name: Synchronize Profile repository handoff
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          root = Path('.')

          handoff = root / 'docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md'
          text = handoff.read_text()
          text = text.replace('This handoff records the isolated approved-theme v1 redesign candidate for the **Profile only** step in the locked screen order.', 'This handoff records the completed isolated approved-theme v1 redesign for the **Profile only** step in the locked screen order.')
          text = text.replace('- Profile pull request: create only after the focused branch is complete\n- Profile verification: required before merge', '- Final verified runtime head: `000c90b87984d41cd01a093a790457fb187ec7a3`\n- Profile pull request: `#47`\n- Runtime merge on `main`: `01e25967098594dbe67d4c523d12fe249e810564`\n- Final verification: GitHub Actions `Fraud Academy Verify` run `#409` passed the complete named smoke chain, production build, desktop Chromium, and Pixel 7 Chromium')
          text = text.replace('## Required verification gate\n\nThe final Profile branch head must pass all of these gates before merge:', '## Completed verification\n\nThe final Profile branch head passed all of these gates before merge:')
          text = text.replace('After Profile passes, merges, and this handoff is synchronized, re-audit the new `main` head, active redesign branches, open pull requests, recent commits, CI, GitHub Issue #22, and the completed Profile verification. Then begin **final responsive/mobile polish only**. Do not make additional screen redesign changes in the Profile pull request.', 'Re-audit the new `main` head, active branches, open pull requests, recent commits, CI/browser results, this completed Profile handoff, and `docs/FRAUD_ACADEMY_SOURCE_OF_TRUTH.md`. Then begin **final responsive/mobile polish only** on a separate branch. Preserve every verified screen, Evidence First, Luna locking, IndexedDB-first generated cases, the four-item global navigation, and the single Connections → System Access Lane.')
          handoff.write_text(text)

          sot = root / 'docs/FRAUD_ACADEMY_SOURCE_OF_TRUTH.md'
          text = sot.read_text()
          decision_block = "The approved Decision & Luna handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md\n```\n"
          if 'docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md' not in text:
              text = text.replace(decision_block, decision_block + "\nThe approved Academy handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md\n```\n\nThe approved Profile handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_PROFILE_THEME_V1.md\n```\n", 1)
          text = text.replace('Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, and Decision & Luna are the completed approved replacements.', 'Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, Decision & Luna, Academy, and Profile are the completed approved replacements.')
          text = text.replace('Decision & Luna use `src/SubmitDecisionPanel.jsx`, `src/LunaPostSubmissionPanel.jsx`, `src/displayDecisionLunaThemeV1.css`, and `src/displayDecisionLunaLayoutSafetyV1.css`. Preserve working routes', 'Decision & Luna use `src/SubmitDecisionPanel.jsx`, `src/LunaPostSubmissionPanel.jsx`, `src/displayDecisionLunaThemeV1.css`, and `src/displayDecisionLunaLayoutSafetyV1.css`; Academy uses `src/AcademyThemeV1Panel.jsx`, `src/displayAcademyThemeV1.css`, and `src/displayAcademyThemeV1Safety.css`; Profile uses `src/ProfileThemeV1Panel.jsx`, `src/displayProfileThemeV1.css`, and `src/displayProfileThemeV1Safety.css`. Preserve working routes')
          text = text.replace('- `docs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md` is the approved Decision & Luna handoff. It records the Evidence First determination workspace, case-scoped learner package, locked and unlocked Luna states, responsive verification, and the Academy-only next step.', '- `docs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md` is the approved Decision & Luna handoff. It records the Evidence First determination workspace, case-scoped learner package, locked and unlocked Luna states, and responsive verification.\n- `docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md` is the completed Academy handoff. It records the Evidence First learning center, four learning paths, Fraud Library, neutral achievement guidance, contextual Academy Progress, responsive isolation, runtime PR #43, verified head `11ee589509368a75e049c67474d1a1e648d9911a`, and merge commit `c7154d9b66c1446cdc32f34b2148b8eb83a70be7`.\n- `docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md` is the completed Profile handoff. It records the contextual avatar-owned profile, activity-based rank and skills, badges, saved-work summary, active-case goals, runtime PR #47, verified head `000c90b87984d41cd01a093a790457fb187ec7a3`, merge commit `01e25967098594dbe67d4c523d12fe249e810564`, and the final responsive/mobile polish-only next step.')
          decision_css = '- `src/displayDecisionLunaThemeV1.css` owns the approved light-lavender Decision and Luna presentation. `src/displayDecisionLunaLayoutSafetyV1.css` owns focused Determination/Luna viewport containment and phone gutters. Neither file may access persistence, expand System Access, or add fixed overlays.'
          if '`src/ProfileThemeV1Panel.jsx` owns the approved contextual Agent profile' not in text:
              text = text.replace(decision_css, decision_css + '\n- `src/AcademyThemeV1Panel.jsx` owns the approved Academy learning center: neutral Evidence First learning paths, Fraud Library topics, achievement guidance, and functional routes to Workspace, Cases, and contextual Academy Progress. `src/displayAcademyThemeV1.css` owns its responsive presentation, while `src/displayAcademyThemeV1Safety.css` isolates Academy from unreplaced Workspace surfaces without changing their behavior.\n- `src/ProfileThemeV1Panel.jsx` owns the approved contextual Agent profile: activity-based investigator rank, neutral saved-work metrics, skill proficiency, badges, activity summary, active-case goals, and routes to Workspace, Academy, and Academy Progress. `src/displayProfileThemeV1.css` owns its responsive presentation, while `src/displayProfileThemeV1Safety.css` isolates Profile from Workspace surfaces. Profile must not become a fifth global destination, access generated-case persistence, calculate Luna scoring, expand System Access, or absorb final polish work.', 1)
          decision_browser = '- `tests/decision-luna-browser.spec.mjs` verifies the approved Decision & Luna flow on desktop and Pixel 7, including Evidence First lock copy, package readiness, learner choice, confidence, rationale, saved-package submission, immediate and persisted Luna unlock, debrief routes, viewport containment, and Return to Queue.'
          if '`tests/profile-browser.spec.mjs` verifies the approved contextual Profile' not in text:
              text = text.replace(decision_browser, decision_browser + '\n- `tests/academy-browser.spec.mjs` verifies the approved Academy on desktop and Pixel 7, including four learning paths, neutral copy, contextual Academy Progress, Cases and Workspace routes, isolation, and viewport safety.\n- `tests/profile-browser.spec.mjs` verifies the approved contextual Profile on desktop and Pixel 7, including avatar entry from Workspace and Dashboard, neutral rank/skill/badge/goal metrics, Workspace/Academy/Progress routes, four-item navigation, isolation, and viewport safety.', 1)
          text = text.replace('Decision and Luna approved-theme v1 guard, release-package documentation guard', 'Decision and Luna approved-theme v1 guard, Academy approved-theme v1 guard, Profile approved-theme v1 guard, release-package documentation guard')
          text = text.replace('Timeline, and Decision & Luna, all three built-in cases', 'Timeline, Decision & Luna, Academy, and Profile, all three built-in cases')
          old_next = "The approved Dashboard, Cases, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, and Decision & Luna redesigns are complete and protected by focused static and desktop/mobile browser guards. The next isolated safe item is **Academy only**. Preserve contextual Academy Progress, saved learner-package snapshots, same-session package refresh, neutral visible wording, Evidence First, Luna's pre-submission lock, active-case routing, IndexedDB-first generated-case persistence, the four-item global navigation, and the single Connections → System Access Lane. Do not begin Profile or final responsive/mobile redesign in the same pull request."
          new_next = "The approved Dashboard, Cases, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, Decision & Luna, Academy, and Profile redesigns are complete and protected by focused static and desktop/mobile browser guards. The next isolated safe item is **final responsive/mobile polish only**. Preserve every completed screen boundary, the four-item global navigation, contextual Profile and Academy Progress routes, Evidence First, Luna's pre-submission lock, IndexedDB-first generated-case persistence, active-case and case-scoped state, and the single Connections → System Access Lane. Do not add new product modules or redesign investigation behavior in the final polish pull request."
          text = text.replace(old_next, new_next)
          sot.write_text(text)

          readme = root / 'README.md'
          text = readme.read_text()
          decision_block = "The approved Decision and Luna handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md\n```\n"
          if 'docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md' not in text:
              text = text.replace(decision_block, decision_block + "\nThe approved Academy handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md\n```\n\nThe approved Profile handoff lives in:\n\n```text\ndocs/FRAUD_ACADEMY_PROFILE_THEME_V1.md\n```\n", 1)
          text = text.replace('the Decision and Luna handoff records the completed determination, protected pre-submission lock, post-submission coaching, and Academy-only next step,', 'the Decision and Luna handoff records the completed determination, protected pre-submission lock, and post-submission coaching, the Academy handoff records the completed learning center, the Profile handoff records the completed contextual profile and final-polish-only next step,')
          decision_line = '- The Decision and Luna approved theme v1 replacement uses `src/SubmitDecisionPanel.jsx`, `src/LunaPostSubmissionPanel.jsx`, `src/displayDecisionLunaThemeV1.css`, and `src/displayDecisionLunaLayoutSafetyV1.css` for the Evidence First determination workspace, package readiness, lane-organized learner choices, responsive package saving, the protected pre-submission Luna lock, and the case-scoped post-submission debrief.'
          if 'The Profile approved theme v1 replacement uses' not in text:
              text = text.replace(decision_line, decision_line + '\n- The Academy approved theme v1 replacement uses `src/AcademyThemeV1Panel.jsx`, `src/displayAcademyThemeV1.css`, and `src/displayAcademyThemeV1Safety.css` for four Evidence First learning paths, Fraud Library topics, neutral achievement guidance, contextual Academy Progress, functional Cases and Workspace routes, and responsive isolation.\n- The Profile approved theme v1 replacement uses `src/ProfileThemeV1Panel.jsx`, `src/displayProfileThemeV1.css`, and `src/displayProfileThemeV1Safety.css` for the contextual avatar-owned profile, activity-based rank, neutral saved-work metrics, skill proficiency, badges, active-case goals, routes, and responsive isolation.', 1)
          text = text.replace('- `docs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md` records the isolated Decision and Luna scope, protected package and debrief behavior, completed desktop/mobile verification gate, and Academy-only next step.', '- `docs/FRAUD_ACADEMY_DECISION_LUNA_THEME_V1.md` records the isolated Decision and Luna scope, protected package and debrief behavior, and completed desktop/mobile verification gate.\n- `docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md` records the isolated completed Academy scope and desktop/mobile verification.\n- `docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md` records the isolated completed Profile scope, avatar routes, protected neutral metrics, desktop/mobile verification, and final responsive/mobile polish-only next step.')
          text = text.replace('13. Playwright validates the approved Dashboard, Cases queue, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, and Decision and Luna,', '13. Playwright validates the approved Dashboard, Cases queue, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, Decision and Luna, Academy, and Profile,')
          decision_note = '34. The approved Decision and Luna theme v1 replaces only Determination and Debrief, preserves the package and persistence boundaries, keeps Luna locked before submission, adds the active-case post-submission review, and has focused static plus desktop/mobile browser guards.'
          if '35. The approved Academy theme v1' not in text:
              text = text.replace(decision_note, decision_note + '\n35. The approved Academy theme v1 replaces only the learning center, preserves contextual Academy Progress and case routes, keeps learning copy neutral, isolates unreplaced Workspace surfaces, and has focused static plus desktop/mobile browser guards.\n36. The approved Profile theme v1 replaces only the contextual Agent profile, preserves four-item navigation and workspace controls, keeps activity metrics neutral, isolates Workspace surfaces, and has focused static plus desktop/mobile browser guards.', 1)
          text = text.replace('1. Redesign Academy only using the approved theme v1 while preserving the existing learning content, Academy Progress routes, saved learner-package snapshots, active-case routes, Evidence First wording, and four-item navigation.\n2. Continue the locked order after Academy: Profile, then final responsive/mobile polish.', '1. Complete final responsive/mobile polish only across the verified screen set without changing screen ownership, investigation behavior, persistence, Evidence First, Luna gating, or System Access.\n2. Re-run the complete desktop and Pixel 7 suite after each focused polish change.')
          decision_coverage = '8. The approved Decision and Luna flow renders on desktop and Pixel 7 with the readiness checklist, package submission, locked pre-submission Luna state, case-scoped post-submission debrief, refresh persistence, functional Workspace/Case Summary/Queue routes, and no required page overflow.'
          if 'The approved Profile renders on desktop and Pixel 7' not in text:
              text = text.replace(decision_coverage, decision_coverage + '\n9. The approved Academy renders on desktop and Pixel 7 with four Evidence First learning paths, Fraud Library topics, neutral achievement guidance, contextual Progress, functional Cases and Workspace routes, isolation, and no required page overflow.\n10. The approved Profile renders on desktop and Pixel 7 with contextual avatar entry, neutral rank/skills/badges/goals, Workspace/Academy/Progress routes, four-item navigation, isolation, and no required page overflow.', 1)
              start = text.index('## Browser-confirmed functional coverage')
              end = text.index('## Latest handoff')
              lines = text[start:end].splitlines()
              count = 0
              for index, line in enumerate(lines):
                  match = re.match(r'^(\d+)\. (.*)$', line)
                  if match:
                      count += 1
                      lines[index] = f'{count}. {match.group(2)}'
              text = text[:start] + '\n'.join(lines) + '\n\n' + text[end:]
          text = text.replace('The approved Dashboard, Cases, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, and Decision and Luna theme v1 replacements are merged and protected by focused static guards plus desktop and Pixel 7 browser coverage. The implementations keep the four-item navigation, active case, contextual Academy Progress, neutral visible wording, Evidence First, Luna locking, IndexedDB-first generated cases, and the single Connections → System Access Lane unchanged. The next isolated screen is **Academy only**.', 'The approved Dashboard, Cases, Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, Decision and Luna, Academy, and Profile theme v1 replacements are merged and protected by focused static guards plus desktop and Pixel 7 browser coverage. The implementations keep the four-item navigation, active case, contextual Profile and Academy Progress, neutral visible wording, Evidence First, Luna locking, IndexedDB-first generated cases, and the single Connections → System Access Lane unchanged. The next isolated step is **final responsive/mobile polish only**.')
          text = text.replace('Decision and Luna approved-theme v1, release-package documentation', 'Decision and Luna approved-theme v1, Academy approved-theme v1, Profile approved-theme v1, release-package documentation')
          text = text.replace('Timeline, and Decision and Luna, all three built-in cases', 'Timeline, Decision and Luna, Academy, and Profile, all three built-in cases')
          readme.write_text(text)

          guard_names = [
              'case-briefing-theme-v1-smoke-check.mjs',
              'cases-theme-v1-smoke-check.mjs',
              'customer-360-theme-v1-smoke-check.mjs',
              'dashboard-theme-v1-smoke-check.mjs',
              'decision-luna-theme-v1-smoke-check.mjs',
              'investigation-tools-theme-v1-smoke-check.mjs',
              'timeline-theme-v1-smoke-check.mjs',
              'workspace-shell-theme-v1-smoke-check.mjs',
          ]
          for name in guard_names:
              path = root / 'scripts' / name
              value = path.read_text()
              value = value.replace('The next isolated safe item is **Academy only**', 'The next isolated safe item is **final responsive/mobile polish only**')
              value = value.replace('The next isolated screen is **Academy only**', 'The next isolated step is **final responsive/mobile polish only**')
              value = value.replace('Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, and Decision & Luna are the completed approved replacements', 'Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, Investigation tools, Timeline, Decision & Luna, Academy, and Profile are the completed approved replacements')
              value = value.replace('Decision & Luna are the completed approved replacements', 'Decision & Luna, Academy, and Profile are the completed approved replacements')
              value = value.replace('the synchronized Academy-only handoff', 'the synchronized final-polish-only handoff')
              path.write_text(value)

          academy_guard = root / 'scripts/academy-theme-v1-smoke-check.mjs'
          value = academy_guard.read_text()
          if "const sourceOfTruth =" not in value:
              value = value.replace("const handoff = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md'), 'utf8');\n", "const handoff = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md'), 'utf8');\nconst sourceOfTruth = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_SOURCE_OF_TRUTH.md'), 'utf8');\nconst readme = fs.readFileSync(path.join(rootDir, 'README.md'), 'utf8');\n")
          value = value.replace("mustContain('Academy handoff', handoff, 'Profile only');\n", "mustContain('Academy handoff', handoff, 'Profile only');\nmustContain('Source of Truth', sourceOfTruth, '`docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md`');\nmustContain('Source of Truth', sourceOfTruth, 'Decision & Luna, Academy, and Profile are the completed approved replacements');\nmustContain('Source of Truth', sourceOfTruth, 'The next isolated safe item is **final responsive/mobile polish only**');\nmustContain('README', readme, 'docs/FRAUD_ACADEMY_ACADEMY_THEME_V1.md');\nmustContain('README', readme, 'The next isolated step is **final responsive/mobile polish only**');\n")
          academy_guard.write_text(value)

          profile_guard = root / 'scripts/profile-theme-v1-smoke-check.mjs'
          value = profile_guard.read_text()
          value = value.replace("const handoff = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md'), 'utf8');\n", "const handoff = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md'), 'utf8');\nconst sourceOfTruth = fs.readFileSync(path.join(rootDir, 'docs/FRAUD_ACADEMY_SOURCE_OF_TRUTH.md'), 'utf8');\nconst readme = fs.readFileSync(path.join(rootDir, 'README.md'), 'utf8');\n")
          value = value.replace("mustContain('Profile handoff', handoff, 'final responsive/mobile polish only');\n", "mustContain('Profile handoff', handoff, 'Final verified runtime head: `000c90b87984d41cd01a093a790457fb187ec7a3`');\nmustContain('Profile handoff', handoff, 'Runtime merge on `main`: `01e25967098594dbe67d4c523d12fe249e810564`');\nmustContain('Profile handoff', handoff, 'final responsive/mobile polish only');\nmustContain('Source of Truth', sourceOfTruth, '`docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md`');\nmustContain('Source of Truth', sourceOfTruth, 'Decision & Luna, Academy, and Profile are the completed approved replacements');\nmustContain('Source of Truth', sourceOfTruth, 'The next isolated safe item is **final responsive/mobile polish only**');\nmustContain('README', readme, 'docs/FRAUD_ACADEMY_PROFILE_THEME_V1.md');\nmustContain('README', readme, 'The next isolated step is **final responsive/mobile polish only**');\n")
          profile_guard.write_text(value)

          Path('.github/workflows/profile-handoff-sync.yml').unlink()
          PY

      - name: Commit synchronized handoff
        run: |
          git config user.name "fraud-academy-audit"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs scripts .github/workflows/profile-handoff-sync.yml
          git commit -m "Sync Profile handoff after approved merge"
          git push origin HEAD:agent/profile-handoff-sync
