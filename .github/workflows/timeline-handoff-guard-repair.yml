name: Timeline handoff guard repair

on:
  push:
    branches:
      - agent/timeline-handoff-sync

permissions:
  contents: write

jobs:
  repair-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Check out handoff branch
        uses: actions/checkout@v4
        with:
          ref: agent/timeline-handoff-sync
          fetch-depth: 0

      - name: Advance completed-screen anchors
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          old = 'Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, and Investigation tools are the completed approved replacements'
          new = 'Dashboard, Cases, the Workspace shell, Case Briefing, Customer 360, Investigation tools, and Timeline are the completed approved replacements'
          changed = 0
          for script in Path('scripts').glob('*theme-v1-smoke-check.mjs'):
              text = script.read_text()
              if old in text:
                  script.write_text(text.replace(old, new))
                  changed += 1
          if not changed:
              raise SystemExit('No stale completed-screen guard anchors were found')
          print(f'Updated {changed} focused guard files')
          PY

          rm .github/workflows/timeline-handoff-guard-repair.yml
          git config user.name "Fraud Academy Automation"
          git config user.email "actions@users.noreply.github.com"
          git add scripts .github/workflows/timeline-handoff-guard-repair.yml
          git commit -m "Advance completed-screen guards through Timeline"
          git push origin HEAD:agent/timeline-handoff-sync
