name: Timeline handoff synchronization

on:
  push:
    branches:
      - agent/timeline-handoff-sync

permissions:
  contents: write

jobs:
  sync-handoff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out handoff branch
        uses: actions/checkout@v4
        with:
          ref: agent/timeline-handoff-sync
          fetch-depth: 0

      - name: Synchronize Timeline handoff
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_required(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Missing required handoff anchor in {path}: {old}")
              file.write_text(text.replace(old, new))

          source = Path('docs/FRAUD_ACADEMY_SOURCE_OF_TRUTH.md')
          source_text = source.read_text()
